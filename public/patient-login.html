<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | MediHelp</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', dark: '#0f172a' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white min-h-screen relative overflow-hidden flex items-center justify-center">
    <!-- Background Effects -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[40rem] h-[40rem] bg-primary rounded-full mix-blend-multiply filter blur-[150px] opacity-20"></div>
    </div>

    <!-- Back Button -->
    <a href="/" class="absolute top-8 left-8 text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Back to roles
    </a>

    <!-- Login Container -->
    <div class="w-full max-w-md p-8 glass-dark rounded-3xl border border-white/10 shadow-2xl relative animate-fade-up">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/20 text-primary mb-4 border border-primary/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold mb-2">Patient Login</h2>
            <p class="text-gray-400 text-sm">Welcome back! Please enter your details.</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="errorMsg" class="hidden text-rose-500 text-sm font-medium bg-rose-500/10 p-3 rounded-lg border border-rose-500/20"></div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" placeholder="john.doe@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" required>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" required>
                </div>
            </div>
            <div class="flex items-center justify-between mt-4">
                <label class="flex items-center text-sm text-gray-400 cursor-pointer">
                    <input type="checkbox" class="custom-checkbox mr-2 shrink-0" style="--form-control-color: white; --checked-color: #0ea5e9;">
                    Remember me
                </label>
                <a href="#" class="text-sm text-primary hover:text-white transition-colors">Forgot password?</a>
            </div>

            <button type="submit" class="w-full py-3.5 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90 transition-colors shadow-lg shadow-primary/25 mt-6">
                Sign In to Portal
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-400">
            Don't have an account? <a href="/patient-register.html" class="text-primary hover:text-white font-medium transition-colors">Sign up</a>
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: 'patient', identifier: email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/patient-dashboard.html';
                } else {
                    errorMsg.textContent = data.error;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
