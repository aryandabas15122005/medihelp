<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration | MediHelp</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0ea5e9', dark: '#0f172a' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white min-h-screen relative flex items-center justify-center p-6 overflow-y-auto">
    <!-- Background Effects -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[40rem] h-[40rem] bg-primary rounded-full mix-blend-multiply filter blur-[150px] opacity-20"></div>
    </div>

    <!-- Back Button -->
    <a href="/patient-login.html" class="absolute top-8 left-8 text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
        </svg>
        Back to Login
    </a>

    <!-- Register Container -->
    <div class="w-full max-w-md p-8 glass-dark rounded-3xl border border-white/10 shadow-2xl relative animate-fade-up">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2">Create Account</h2>
            <p class="text-gray-400 text-sm">Join the patient portal today.</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div id="errorMsg" class="hidden text-rose-500 text-sm font-medium bg-rose-500/10 p-3 rounded-lg border border-rose-500/20"></div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                <div class="relative">
                    <input type="text" id="name" placeholder="John Doe" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" required>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" placeholder="john.doe@example.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" required>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-primary/50 focus:ring-1 focus:ring-primary/50 transition-all outline-none" required>
                </div>
            </div>

            <div id="otpSection" class="hidden animate-fade-up">
                <label class="block text-sm font-medium text-emerald-400 mb-1">Verification Code (Sent to Email)</label>
                <div class="relative">
                    <input type="text" id="otp" placeholder="6-digit code" maxlength="6" class="w-full bg-emerald-500/5 border border-emerald-500/20 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 transition-all outline-none tracking-widest font-bold">
                </div>
                <p class="text-[10px] text-emerald-400/60 mt-2 px-1">Please check your spam folder if you don't see the mail.</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-3.5 rounded-xl bg-primary text-white font-semibold hover:bg-primary/90 transition-colors shadow-lg shadow-primary/25 mt-6">
                Get Verification Code
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-400">
            Already have an account? <a href="/patient-login.html" class="text-primary hover:text-white font-medium transition-colors">Log in</a>
        </p>
    </div>

    <script>
        let isOtpSent = false;

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('otp').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const otpSection = document.getElementById('otpSection');
            
            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;

            try {
                if (!isOtpSent) {
                    // STEP 1: Send OTP
                    submitBtn.textContent = 'Sending Code...';
                    const res = await fetch('/api/auth/send-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        isOtpSent = true;
                        otpSection.classList.remove('hidden');
                        document.getElementById('otp').required = true;
                        submitBtn.textContent = 'Verify & Register';
                        submitBtn.classList.replace('bg-primary', 'bg-emerald-600');
                    } else {
                        errorMsg.textContent = data.error;
                        errorMsg.classList.remove('hidden');
                        submitBtn.textContent = 'Get Verification Code';
                    }
                } else {
                    // STEP 2: Verify & Register
                    submitBtn.textContent = 'Verifying...';
                    const res = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ role: 'patient', name, identifier: email, password, otp })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/patient-dashboard.html';
                    } else {
                        errorMsg.textContent = data.error;
                        errorMsg.classList.remove('hidden');
                        submitBtn.textContent = 'Verify & Register';
                    }
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again.';
                errorMsg.classList.remove('hidden');
                submitBtn.textContent = isOtpSent ? 'Verify & Register' : 'Get Verification Code';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
